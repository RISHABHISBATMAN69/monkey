<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gesture Meme · Minimal</title>
    <link rel="stylesheet" href="style.css">
    <!-- MediaPipe tasks-vision from official Google CDN (most reliable) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js" crossorigin="anonymous"></script>
    <script>
        // If the primary CDN fails, try unpkg as fallback
        window.MEDIAPIPE_LOADED = false;
        function checkMediaPipe() {
            if (typeof FilesetResolver !== 'undefined') {
                window.MEDIAPIPE_LOADED = true;
                console.log('✅ MediaPipe loaded from primary CDN');
            } else {
                console.warn('Primary CDN failed, loading fallback...');
                const fallbackScript = document.createElement('script');
                fallbackScript.src = 'https://unpkg.com/@mediapipe/tasks-vision@0.10.14/vision_bundle.js';
                fallbackScript.onload = () => {
                    window.MEDIAPIPE_LOADED = true;
                    console.log('✅ MediaPipe loaded from fallback');
                };
                fallbackScript.onerror = () => {
                    console.error('❌ All MediaPipe CDNs failed');
                    document.getElementById('status-text').innerText = 'MediaPipe load error - refresh or check network';
                };
                document.head.appendChild(fallbackScript);
            }
        }
        setTimeout(checkMediaPipe, 100);
    </script>
</head>
<body>
    <div class="app-container">
        <div class="camera-container" id="cameraContainer">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="landmark-canvas"></canvas>
            
            <div id="meme-overlay" class="meme-overlay hidden">
                <div class="meme-background"></div>
                <img id="meme-image" src="" alt="Meme">
                <div id="meme-caption" class="meme-caption"></div>
            </div>
            
            <div id="status-indicator" class="status-indicator">
                <span class="status-dot"></span>
                <span id="status-text">Initializing...</span>
            </div>
        </div>

        <div class="control-panel" id="controlPanel">
            <div class="panel-header">
                <h2>Gesture Control</h2>
                <button id="togglePanelBtn" class="icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="18 15 12 9 6 15"></polyline>
                    </svg>
                </button>
            </div>
            
            <div class="panel-content">
                <button id="startBtn" class="primary-btn">
                    <span class="btn-icon">●</span>
                    Start Camera
                </button>
                
                <div class="gesture-grid">
                    <div class="gesture-card" data-gesture="1">
                        <div class="gesture-icon">☝️</div>
                        <div class="gesture-info">
                            <span class="gesture-name">Point & Smile</span>
                            <span class="gesture-status" id="gesture1-status">—</span>
                        </div>
                        <div class="progress-bar" id="progress1"></div>
                    </div>
                    <div class="gesture-card" data-gesture="2">
                        <div class="gesture-icon">🤔</div>
                        <div class="gesture-info">
                            <span class="gesture-name">Think & Look Up</span>
                            <span class="gesture-status" id="gesture2-status">—</span>
                        </div>
                        <div class="progress-bar" id="progress2"></div>
                    </div>
                    <div class="gesture-card" data-gesture="3">
                        <div class="gesture-icon">😱</div>
                        <div class="gesture-info">
                            <span class="gesture-name">Hands on Chest</span>
                            <span class="gesture-status" id="gesture3-status">—</span>
                        </div>
                        <div class="progress-bar" id="progress3"></div>
                    </div>
                    <div class="gesture-card" data-gesture="4">
                        <div class="gesture-icon">🖕🖕</div>
                        <div class="gesture-info">
                            <span class="gesture-name">Double Middle</span>
                            <span class="gesture-status" id="gesture4-status">—</span>
                        </div>
                        <div class="progress-bar" id="progress4"></div>
                    </div>
                    <div class="gesture-card" data-gesture="5">
                        <div class="gesture-icon">😉👉</div>
                        <div class="gesture-info">
                            <span class="gesture-name">Point Chin & Wink</span>
                            <span class="gesture-status" id="gesture5-status">—</span>
                        </div>
                        <div class="progress-bar" id="progress5"></div>
                    </div>
                </div>
                
                <details class="settings-section">
                    <summary>Sensitivity Tuning</summary>
                    <div class="slider-group">
                        <label>Mouth Open <span id="mouthVal">0.025</span></label>
                        <input type="range" id="mouthSlider" min="0.01" max="0.10" step="0.005" value="0.025">
                    </div>
                    <div class="slider-group">
                        <label>Smile Stretch <span id="smileVal">0.20</span></label>
                        <input type="range" id="smileSlider" min="0.15" max="0.40" step="0.01" value="0.20">
                    </div>
                    <div class="slider-group">
                        <label>Touch Distance <span id="touchVal">0.12</span></label>
                        <input type="range" id="touchSlider" min="0.03" max="0.15" step="0.005" value="0.12">
                    </div>
                </details>
                
                <button id="debugToggleBtn" class="secondary-btn">
                    <span class="btn-icon">🔍</span>
                    Show Debug Info
                </button>
            </div>
        </div>
        
        <div id="debugOverlay" class="debug-overlay hidden">
            <pre id="debugContent"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
