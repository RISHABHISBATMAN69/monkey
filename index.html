<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Meme Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Video Feed -->
        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <!-- Meme Overlay -->
        <div id="memeOverlay" class="meme-overlay hidden">
            <img id="memeImage" src="" alt="Meme">
        </div>

        <!-- Settings Button -->
        <button class="settings-btn" id="settingsBtn">⚙️</button>

        <!-- Drawer Overlay (background click to close) -->
        <div class="drawer-overlay hidden" id="drawerOverlay"></div>

        <!-- Control Panel Drawer -->
        <div class="control-panel" id="controlPanel">
            <div class="status">
                <span id="statusText">Camera Off</span>
            </div>
            
            <div class="controls">
                <button id="toggleCamera" class="btn primary">Start Camera</button>
                <button id="toggleTracking" class="btn secondary">Show Tracking</button>
            </div>

            <div class="divider"></div>

            <div class="test-controls">
                <p class="label">Manual Test</p>
                <button class="btn test" data-meme="./point up.webp">👆 Point Up</button>
                <button class="btn test" data-meme="./thinking monkey.webp">🤔 Thinking</button>
                <button class="btn test" data-meme="./image_745226.png">😱 Gasping</button>
                <button class="btn test" data-meme="./image_745264.png">🖕 Double Bird</button>
                <button class="btn test" data-meme="./image_745cee.png">😉 Wink Point</button>
                <button class="btn test" data-meme="./ccg.jpg">😱 Chud Gaye Guru</button>
            </div>
        </div>

        <!-- Detection Info (for debugging) -->
        <div class="debug-info" id="debugInfo">
            <p>Hand: <span id="handStatus">-</span></p>
            <p>Face: <span id="faceStatus">-</span></p>
        </div>
    </div>

    <!-- Background Music -->
    
    <audio id="bgMusic" loop autoplay>
    <source src="music.mp3" type="audio/mpeg">
</audio>

    <!-- MediaPipe CDN -->
    <script src="app.js"></script>
</body>
</html>
